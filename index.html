<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zaya — 聊聊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAF8F5;
  --bg-2:#F2EDE7;
  --ink:#1E2B24;
  --ink-soft:#3D4F45;
  --muted:#5C6B63;
  --muted-2:#8A968E;
  --accent:#8B6B94;
  --accent-deep:#6B4A75;
  --accent-2:#D4C4D8;
  --cream:#FFFDFB;
  --border:rgba(30,43,36,.07);
  --shadow-soft:0 4px 24px rgba(30,43,36,.06);
  --shadow-card:0 12px 40px rgba(30,43,36,.08),0 1px 0 rgba(255,255,255,.6) inset;
  --radius:26px;
  --serif:'Noto Serif SC',Georgia,'Songti SC',serif;
  --sans:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--sans);
  background:radial-gradient(ellipse 120% 80% at 50% -20%,#E8E0D8 0%,#D8D0C8 45%,#C9C2BD 100%);
  color:var(--ink);display:flex;justify-content:center;min-height:100vh;padding:16px;
}
.phone-frame{
  width:393px;max-width:100%;background:var(--bg);border-radius:44px;overflow:hidden;
  box-shadow:0 32px 80px rgba(20,30,25,.14),0 0 0 1px rgba(255,255,255,.5) inset;
  position:relative;
}
.notch{width:126px;height:34px;background:#1a1a1a;border-radius:20px;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20}
.screen{height:852px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.screen::-webkit-scrollbar{display:none}
.header{padding:52px 22px 4px}
.greeting{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--muted-2)}
.header-lead{
  font-family:var(--serif);font-size:20px;font-weight:500;font-style:italic;
  color:var(--ink-soft);letter-spacing:.02em;line-height:1.35;margin-top:14px;
}
.header-sub{
  font-family:var(--sans);font-size:13px;font-weight:400;color:var(--muted);
  margin-top:8px;line-height:1.45;letter-spacing:.02em;
}

.question-card{
  margin:20px 16px 0;padding:24px 20px 22px;
  border-radius:var(--radius);position:relative;overflow:hidden;
  background:linear-gradient(158deg,#FFFDFB 0%,#F3EBE4 38%,#E5D9CE 100%);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:var(--shadow-card);
  transition:opacity .2s ease,transform .2s ease;
}
.question-card::before{
  content:'';position:absolute;top:-36px;right:-36px;width:168px;height:168px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,107,148,.16) 0%,transparent 72%);
}
.q-context{
  display:inline-block;padding:4px 10px;border-radius:999px;
  background:rgba(139,107,148,.08);
  font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.06em;
  margin-bottom:14px;position:relative;z-index:1;
}
.q-insight{
  font-family:var(--serif);font-size:14px;font-weight:400;font-style:italic;
  color:var(--muted);line-height:1.5;
  margin-bottom:10px;position:relative;z-index:1;
}
.q-text{
  font-family:var(--serif);font-size:19px;font-weight:500;line-height:1.52;
  color:var(--ink);position:relative;z-index:1;
  letter-spacing:.015em;
}
.q-actions{
  display:flex;align-items:center;gap:6px 10px;margin-top:18px;position:relative;z-index:1;flex-wrap:wrap;
}
.btn-reflect{
  display:inline-flex;align-items:center;gap:8px;padding:13px 26px;
  background:linear-gradient(145deg,#2D3D34 0%,#1E2B24 52%,#152018 100%);
  color:#fff;border:none;border-radius:999px;
  font:inherit;font-size:14px;font-weight:600;cursor:pointer;
  box-shadow:0 6px 20px rgba(30,43,36,.26),0 1px 0 rgba(255,255,255,.1) inset;
}
.btn-reflect:active{transform:scale(.97)}
.btn-reflect svg{width:16px;height:16px;stroke:#fff;fill:none}
/* 次级：换一题 — 文字链级，不与主按钮抢视觉层级 */
.btn-renew{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 8px;margin:0 -8px 0 0;
  border:none;border-radius:8px;
  background:transparent;
  font-family:var(--sans);font-size:12px;font-weight:500;
  color:var(--muted);letter-spacing:.02em;
  cursor:pointer;
  transition:color .15s, background .15s;
  flex-shrink:0;
}
.btn-renew:hover{color:var(--accent-deep);background:rgba(139,107,148,.08)}
.btn-renew:active{color:var(--accent-deep);opacity:.88}
.btn-renew svg{
  width:13px;height:13px;stroke:currentColor;fill:none;
  flex-shrink:0;opacity:.85;
}
.btn-renew span{line-height:1;}

.topic-chips-wrap{margin:28px 0 0;padding:0 16px}
.topic-chips-label{
  font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--muted-2);text-transform:uppercase;margin-bottom:10px;
}
.topic-chips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.topic-chip{
  display:flex;align-items:center;justify-content:center;
  padding:12px 8px;border-radius:14px;border:1px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.52);backdrop-filter:blur(8px);
  cursor:pointer;
  font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);
  box-shadow:var(--shadow-soft);
  transition:background .2s,border-color .2s,color .2s,transform .12s;
}
.topic-chip:active{transform:scale(.97)}
.topic-chip.active{
  background:linear-gradient(135deg,var(--accent-deep) 0%,var(--accent) 100%);
  color:#fff;border-color:rgba(255,255,255,.2);
  box-shadow:0 4px 14px rgba(107,74,117,.28);
}

.history-wrap{margin:32px 0 0}
.history-head{display:flex;align-items:center;justify-content:space-between;padding:0 20px 10px}
.history-head span{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--muted-2);text-transform:uppercase}
.h-scroll{display:flex;gap:10px;padding:0 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.h-scroll::-webkit-scrollbar{display:none}
.history-card{
  flex:0 0 200px;scroll-snap-align:start;
  background:var(--cream);border:1px solid var(--border);border-radius:16px;
  padding:14px 14px 16px;
  box-shadow:0 2px 12px rgba(30,43,36,.04);
}
.history-card .hc-topic{font-size:10px;font-weight:700;color:var(--accent-deep);letter-spacing:.06em;margin-bottom:5px}
.history-card .hc-q{font-family:var(--serif);font-size:13px;font-weight:500;color:var(--ink-soft);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.bottom-nav{
  position:absolute;bottom:10px;left:14px;right:14px;z-index:15;
  background:rgba(255,253,250,.9);backdrop-filter:blur(16px) saturate(1.15);
  border-radius:999px;border:1px solid rgba(255,255,255,.65);
  box-shadow:0 8px 32px rgba(30,43,36,.1),0 1px 0 rgba(255,255,255,.85) inset;
  display:flex;justify-content:space-around;padding:10px 6px calc(10px + env(safe-area-inset-bottom));
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted-2);cursor:pointer;opacity:.78}
.nav-item.active{color:var(--accent-deep);font-weight:600;opacity:1}
.nav-icon{font-size:17px}

/* 二级页：在手机框内全屏，盖住底栏；刘海下方起算，不压住灵动岛区域 */
.chat-overlay{
  position:absolute;left:0;right:0;top:46px;bottom:0;background:var(--bg);
  opacity:0;pointer-events:none;transition:opacity .28s ease;z-index:50;
  display:flex;flex-direction:column;
  min-height:0;
  overflow:hidden;
  border-radius:0 0 40px 40px;
}
.chat-overlay.open{opacity:1;pointer-events:auto}
.phone-frame.chat-open .screen{overflow:hidden;pointer-events:none}
.phone-frame.chat-open .bottom-nav{visibility:hidden;pointer-events:none}
.chat-header{
  display:flex;align-items:flex-start;gap:10px;padding:12px 14px 14px 16px;
  flex-shrink:0;
  background:rgba(250,248,245,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.chat-back{
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:var(--cream);cursor:pointer;font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  flex-shrink:0;margin-top:2px;
}
.chat-back:active{transform:scale(.96);background:var(--bg-2)}
.chat-header-info{flex:1;min-width:0;padding-top:2px}
.chat-header-name{font-size:17px;font-weight:600;color:var(--ink);letter-spacing:-.02em;font-family:var(--serif)}
.chat-header-tag{
  display:inline-block;margin-top:6px;padding:3px 10px;border-radius:999px;
  font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--accent-deep);
  background:rgba(139,107,148,.1);border:1px solid rgba(139,107,148,.12);
}
.chat-header-hint{
  font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.chat-body{
  flex:1;min-height:0;
  overflow-y:auto;padding:16px 18px 12px;
  display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;
}
.chat-body::-webkit-scrollbar{display:none}
.chat-bubble{
  max-width:92%;padding:14px 16px;border-radius:22px;
  font-family:var(--sans);font-size:14px;line-height:1.65;color:var(--ink-soft);
  animation:chatIn .38s ease-out both;
}
@keyframes chatIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.chat-bubble.zaya{
  align-self:flex-start;
  background:var(--cream);border:1px solid var(--border);
  border-bottom-left-radius:8px;
  box-shadow:0 2px 12px rgba(30,43,36,.04);
}
.chat-bubble.zaya-serif{
  align-self:flex-start;
  background:var(--cream);border:1px solid var(--border);
  border-bottom-left-radius:8px;
  font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);
  line-height:1.58;
  box-shadow:0 2px 12px rgba(30,43,36,.04);
}
.chat-prompts-wrap{
  flex-shrink:0;
  padding:0 10px max(18px,env(safe-area-inset-bottom,0px)) 10px;
  background:linear-gradient(180deg,rgba(250,248,245,0) 0%,rgba(242,237,231,.55) 14%);
}
.chat-prompts{
  padding:14px 14px 18px;
  border-radius:18px;
  border:1px solid var(--border);
  background:var(--cream);
  box-shadow:0 -2px 20px rgba(30,43,36,.06);
  display:flex;flex-direction:column;gap:10px;
}
.chat-prompts-label{
  font-size:10px;font-weight:700;color:var(--muted-2);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:2px;
}
.chat-prompt-btn{
  background:var(--bg);border:1px solid var(--border);padding:13px 14px;border-radius:16px;
  font-size:13px;color:var(--ink-soft);text-align:left;cursor:pointer;font-family:inherit;line-height:1.5;
  transition:background .15s,border-color .15s;
}
.chat-prompt-btn:active{background:rgba(139,107,148,.07);border-color:rgba(139,107,148,.2)}
</style>
</head>
<body>
<div class="phone-frame">
<div class="notch"></div>
<div class="screen">
  <header class="header">
    <p class="greeting">下午好，Tina</p>
    <p class="header-lead">Let's talk about…</p>
    <p class="header-sub">选个话题，从一句话开始。</p>
  </header>

  <div class="question-card" id="qcard">
    <span class="q-context" id="q-context"></span>
    <p class="q-insight" id="q-insight"></p>
    <p class="q-text" id="q-text"></p>
    <div class="q-actions">
      <button type="button" class="btn-reflect" id="btn-reflect">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        看 Zaya 怎么说
      </button>
      <button type="button" class="btn-renew" id="btn-renew" title="换一个问题">
        <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>换一题</span>
      </button>
    </div>
  </div>

  <div class="topic-chips-wrap">
    <p class="topic-chips-label">话题</p>
    <div class="topic-chips" id="topic-chips"></div>
  </div>

  <div class="history-wrap">
    <div class="history-head">
      <span>最近的问题</span>
    </div>
    <div class="h-scroll">
      <div class="history-card">
        <p class="hc-topic">方向</p>
        <p class="hc-q">你现在手上的事里，哪件像在「玩」，哪件像在「交作业」？</p>
      </div>
      <div class="history-card">
        <p class="hc-topic">关系</p>
        <p class="hc-q">你有没有用过「拖着不回复」来维持一种还没被拒绝的安全感？</p>
      </div>
      <div class="history-card">
        <p class="hc-topic">本命盘</p>
        <p class="hc-q">别人认识的你，和心里那个自己——你觉得差得最远的是哪一点？</p>
      </div>
      <div class="history-card">
        <p class="hc-topic">行运</p>
        <p class="hc-q">金星过 7 宫的这段时间，有没有一个名字比平时更常冒出来？</p>
      </div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item"><span class="nav-icon">✎</span> 日记</div>
  <div class="nav-item active"><span class="nav-icon">◎</span> 探索</div>
  <div class="nav-item"><span class="nav-icon">💬</span> 对话</div>
  <div class="nav-item"><span class="nav-icon">☽</span> 仪式</div>
</nav>

<div class="chat-overlay" id="chat-overlay">
  <div class="chat-header">
    <button type="button" class="chat-back" id="chat-back" aria-label="返回">←</button>
    <div class="chat-header-info">
      <div class="chat-header-name">Zaya</div>
      <div class="chat-header-tag" id="chat-header-tag"></div>
      <p class="chat-header-hint" id="chat-header-hint"></p>
    </div>
  </div>
  <div class="chat-body" id="chat-body"></div>
  <div class="chat-prompts-wrap">
    <div class="chat-prompts">
      <p class="chat-prompts-label">继续聊</p>
      <div id="chat-prompts"></div>
    </div>
  </div>
</div>
</div>

<script>
(function(){
  /** MVP：每话题 2 题；每题独立短 Chat，与二级页文案对齐 */
  var TOPICS = [
    { id:'direction', name:'方向', context:'木星 · 上升狮子',
      variants: [
        { insight:'你的木星就在上升点旁边。',
          question:'你现在手上的事情里，哪件做起来像在「玩」，哪件像在「交作业」？',
          chat: {
            bubbles: [
              { type:'zaya', text:'木星合上升的人，运气常常在你「先迈一步」之后才来，而不是等你觉得准备好了。' },
              { type:'zaya-serif', text:'你怕的很多时候不是做不好，是做一件看起来不够酷的事——但「玩起来」的状态，反而是你能量最对的时候。' }
            ],
            prompts: ['我一直拖着的那件事，到底在怕什么？', '哪件事我其实可以更轻一点开始？']
          }
        },
        { insight:'木星在狮子，很大方的位置。',
          question:'如果有人现在给你一个机会，什么条件会让你秒答应？',
          chat: {
            bubbles: [
              { type:'zaya', text:'狮子能量要的是「被看见」和「值得」。让你秒答应的，往往不只是钱或title，是你觉得这事配得上你的认真。' },
              { type:'zaya-serif', text:'可以想想：那个条件里，哪一条其实是在满足「我不想将就」？' }
            ],
            prompts: ['我真正不能妥协的一条是什么？', '若没有任何面子问题，我还会选吗？']
          }
        }
      ]
    },
    { id:'relation', name:'关系', context:'金星双子 · 7 宫',
      variants: [
        { insight:'你的金星在双子。',
          question:'你有没有用过「拖着不回复」来维持一种还没被拒绝的安全感？',
          chat: {
            bubbles: [
              { type:'zaya', text:'双子金星需要对话感；拖着不回复，有时是你在争取时间，有时是在避免面对一个你已经知道的答案。' },
              { type:'zaya-serif', text:'巨蟹太阳在底下，其实你很怕「确定了就受伤」。拖一下，有时是在保护那个还没准备好面对结果的自己。' }
            ],
            prompts: ['我在拖的，到底是答案还是告别？', '如果对方明天就表态，我怕听到什么？']
          }
        },
        { insight:'你的月亮在双子，跑得很快的位置。',
          question:'最近有没有一个人，聊着聊着你就不想回消息了？是什么让你突然熄火的？',
          chat: {
            bubbles: [
              { type:'zaya', text:'月亮双子对「无聊」和「可预测」很敏感。一旦对话开始重复、没有新信息，你的兴趣会掉得很快。' },
              { type:'zaya-serif', text:'熄火不一定是对方不好，也可能是你的系统在说：这里已经没有你想探索的东西了。' }
            ],
            prompts: ['最近一次熄火，是对方变了还是我累了？', '我其实在等什么样的对话？']
          }
        }
      ]
    },
    { id:'chart', name:'本命盘', context:'结构 · 本命',
      variants: [
        { insight:'太阳在 12 宫，上升在狮子——「被看见」和「想躲起来」都在你身上。',
          question:'你有没有觉得，别人认识的你，和心里那个自己，其实不是同一个人？',
          chat: {
            bubbles: [
              { type:'zaya', text:'12 宫太阳很常见的一个体验是：不是故意装，而是很多感受你习惯自己消化，别人看到的往往是你的上升和社交面。' },
              { type:'zaya-serif', text:'这不是虚伪，是结构——你身上同时有「要亮」和「要藏」两种需求。' }
            ],
            prompts: ['哪一刻我最不像「别人以为的我」？', '我允许自己被看到到什么程度？']
          }
        },
        { insight:'月亮双子，金星也是。',
          question:'你的月亮和金星都在双子——你有没有发现你喜欢一个人的速度和失去兴趣的速度一样快？',
          chat: {
            bubbles: [
              { type:'zaya', text:'月亮金星双子，情绪和喜欢的方式都偏「高频更新」。这不是花心，是你的系统需要新鲜刺激才觉得活着。' },
              { type:'zaya-serif', text:'值得分辨的是：快冷掉的是人，还是你对「重复」的耐受度。' }
            ],
            prompts: ['我快冷掉的时候，通常缺的是哪种刺激？', '有没有一段关系，慢下来之后反而更好？']
          }
        }
      ]
    },
    { id:'transit', name:'行运', context:'近期行运',
      variants: [
        { insight:'金星这两周在过你的第 7 宫。',
          question:'金星正在过你的关系宫——你最近是不是比平时更容易想起某个人？',
          chat: {
            bubbles: [
              { type:'zaya', text:'金星过 7 宫，容易把关系、合作、一对一连接放大——不一定是新的人，也可能是旧线索被翻出来。' },
              { type:'zaya-serif', text:'这段时间适合诚实问一句：我想起 TA，是因为想念，还是因为心里有未完成的对话？' }
            ],
            prompts: ['这段行运最想让我看见的关系模式是什么？', '有没有一句我该说还没说的话？']
          }
        },
        { insight:'火星在双子，路过你的星群。',
          question:'火星在双子加持你的表达——最近有没有一句话你特别想说但一直憋着？',
          chat: {
            bubbles: [
              { type:'zaya', text:'火星在双子，话就是行动。憋着的那句往往最耗能，因为能量卡在嘴里没出去。' },
              { type:'zaya-serif', text:'可以分两句：一句是事实，一句是你真正在意的是什么——双子火星吃「说清楚」。' }
            ],
            prompts: ['那句憋着的话，怕的是后果还是怕显得在意？', '如果只说一句，我会选哪句？']
          }
        }
      ]
    }
  ];

  var currentId = 'direction';
  /** 每个话题当前问题序号，换话题时各自记忆 */
  var qIndexByTopic = { direction:0, relation:0, chart:0, transit:0 };

  function topicById(id){
    for (var i = 0; i < TOPICS.length; i++) if (TOPICS[i].id === id) return TOPICS[i];
    return TOPICS[0];
  }

  function currentVariant(){
    var t = topicById(currentId);
    var idx = qIndexByTopic[currentId] || 0;
    var v = t.variants[idx % t.variants.length];
    return v;
  }

  function renderCard(){
    var t = topicById(currentId);
    var v = currentVariant();
    document.getElementById('q-context').textContent = t.context;
    document.getElementById('q-insight').textContent = v.insight;
    document.getElementById('q-text').textContent = v.question;
  }

  function animateThenRender(){
    var card = document.getElementById('qcard');
    card.style.opacity = '0';
    card.style.transform = 'scale(.98)';
    setTimeout(function(){
      renderCard();
      card.style.opacity = '1';
      card.style.transform = 'scale(1)';
    }, 140);
  }

  function renewQuestion(){
    var t = topicById(currentId);
    var n = t.variants.length;
    var cur = qIndexByTopic[currentId] || 0;
    qIndexByTopic[currentId] = (cur + 1) % n;
    animateThenRender();
  }

  function renderChips(){
    var wrap = document.getElementById('topic-chips');
    wrap.innerHTML = '';
    TOPICS.forEach(function(t){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'topic-chip' + (t.id === currentId ? ' active' : '');
      btn.textContent = t.name;
      btn.addEventListener('click', function(){
        if (currentId === t.id) return;
        currentId = t.id;
        renderChips();
        renderCard();
      });
      wrap.appendChild(btn);
    });
  }

  var chatOverlay = document.getElementById('chat-overlay');
  var chatBodyEl = document.getElementById('chat-body');
  var chatPromptsEl = document.getElementById('chat-prompts');
  var chatHeaderTagEl = document.getElementById('chat-header-tag');
  var chatHeaderHintEl = document.getElementById('chat-header-hint');

  var phoneFrameEl = document.querySelector('.phone-frame');
  var screenEl = document.querySelector('.screen');

  function closeChat(){
    chatOverlay.classList.remove('open');
    phoneFrameEl.classList.remove('chat-open');
    document.body.style.overflow = '';
  }

  function openChat(){
    var t = topicById(currentId);
    var v = currentVariant();
    var c = v.chat;
    chatHeaderTagEl.textContent = t.name + ' · ' + t.context;
    chatHeaderHintEl.textContent = v.question;
    chatBodyEl.innerHTML = '';
    var delay = 0;
    c.bubbles.forEach(function(b){
      var div = document.createElement('div');
      div.className = 'chat-bubble ' + (b.type === 'zaya-serif' ? 'zaya-serif' : 'zaya');
      div.textContent = b.text;
      div.style.animationDelay = delay + 'ms';
      chatBodyEl.appendChild(div);
      delay += 90;
    });
    chatPromptsEl.innerHTML = '';
    c.prompts.forEach(function(p){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chat-prompt-btn';
      btn.textContent = p;
      btn.addEventListener('click', closeChat);
      chatPromptsEl.appendChild(btn);
    });
    chatBodyEl.scrollTop = 0;
    phoneFrameEl.classList.add('chat-open');
    document.body.style.overflow = 'hidden';
    chatOverlay.classList.add('open');
  }

  renderChips();
  renderCard();
  document.getElementById('btn-reflect').addEventListener('click', openChat);
  document.getElementById('btn-renew').addEventListener('click', renewQuestion);
  document.getElementById('chat-back').addEventListener('click', closeChat);
})();
</script>
</body>
</html>
