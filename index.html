<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zaya — 探索 (Opt 2)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAF8F5;
  --bg-2:#F2EDE7;
  --ink:#1E2B24;
  --ink-soft:#3D4F45;
  --muted:#5C6B63;
  --muted-2:#8A968E;
  --accent:#8B6B94;
  --accent-deep:#6B4A75;
  --accent-2:#D4C4D8;
  --cream:#FFFDFB;
  --border:rgba(30,43,36,.07);
  --shadow-soft:0 4px 24px rgba(30,43,36,.06);
  --shadow:0 10px 36px rgba(30,43,36,.09);
  --shadow-card:0 12px 40px rgba(30,43,36,.08),0 1px 0 rgba(255,255,255,.6) inset;
  --radius:26px;
  --radius-sm:18px;
  --serif:'Noto Serif SC',Georgia,'Songti SC',serif;
  --sans:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--sans);
  background:radial-gradient(ellipse 120% 80% at 50% -20%,#E8E0D8 0%,#D8D0C8 45%,#C9C2BD 100%);
  color:var(--ink);display:flex;justify-content:center;min-height:100vh;padding:16px;
}

.phone-frame{
  width:393px;max-width:100%;background:var(--bg);border-radius:44px;overflow:hidden;
  box-shadow:0 32px 80px rgba(20,30,25,.14),0 0 0 1px rgba(255,255,255,.5) inset;
  position:relative;
}
.notch{width:126px;height:34px;background:#1a1a1a;border-radius:20px;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20}
.screen{height:852px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.screen::-webkit-scrollbar{display:none}

.header{padding:52px 22px 6px}
.greeting{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--muted-2)}
.header h1{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink);letter-spacing:-.02em}

/* ---- 大问题卡 ---- */
.question-card{
  margin:20px 16px 0;padding:24px 20px 22px;
  border-radius:var(--radius);position:relative;overflow:hidden;
  background:linear-gradient(158deg,#FFFDFB 0%,#F3EBE4 38%,#E5D9CE 100%);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:var(--shadow-card);
  transition:opacity .3s ease,transform .3s ease;
}
.question-card::before{
  content:'';position:absolute;top:-36px;right:-36px;width:168px;height:168px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,107,148,.16) 0%,transparent 72%);
}
.question-card::after{
  content:'';position:absolute;bottom:-28px;left:-24px;width:128px;height:128px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,165,116,.1) 0%,transparent 72%);
  pointer-events:none;
}
.q-context{
  display:inline-block;padding:4px 10px;border-radius:999px;
  background:rgba(139,107,148,.08);
  font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.06em;
  margin-bottom:14px;position:relative;z-index:1;
}
.q-insight{
  font-family:var(--serif);font-size:14px;font-weight:400;font-style:italic;
  color:var(--muted);line-height:1.5;
  margin-bottom:10px;position:relative;z-index:1;
}
.q-text{
  font-family:var(--serif);font-size:19px;font-weight:500;line-height:1.52;
  color:var(--ink);position:relative;z-index:1;
  letter-spacing:.015em;
}
.q-actions{
  display:flex;align-items:center;gap:12px;margin-top:18px;position:relative;z-index:1;
}
.btn-reflect{
  display:inline-flex;align-items:center;gap:8px;padding:13px 26px;
  background:linear-gradient(145deg,#2D3D34 0%,#1E2B24 52%,#152018 100%);
  color:#fff;border:none;border-radius:999px;
  font:inherit;font-size:14px;font-weight:600;cursor:pointer;
  box-shadow:0 6px 20px rgba(30,43,36,.26),0 1px 0 rgba(255,255,255,.1) inset;
  transition:transform .15s,box-shadow .2s;
}
.btn-reflect:active{transform:scale(.97)}
.btn-reflect svg{width:16px;height:16px;stroke:#fff;fill:none}
.btn-refresh{
  width:48px;height:48px;flex-shrink:0;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,.72);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 1px 0 rgba(255,255,255,.9) inset;
  transition:transform .35s ease-out;
}
.btn-refresh:active{transform:rotate(200deg)}
.btn-refresh svg{width:20px;height:20px;stroke:var(--muted);fill:none}

/* ---- 话题 chips ---- */
.topic-chips-wrap{margin:28px 0 0;padding:0 16px}
.topic-chips-label{
  font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--muted-2);text-transform:uppercase;margin-bottom:10px;
}
.topic-chips{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
}
.topic-chip{
  display:flex;align-items:center;justify-content:center;
  padding:9px 4px;border-radius:14px;border:1px solid rgba(255,255,255,.5);
  background:rgba(255,255,255,.52);backdrop-filter:blur(8px);
  cursor:pointer;white-space:nowrap;
  font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);
  box-shadow:var(--shadow-soft);
  transition:background .2s,border-color .2s,color .2s,transform .12s,box-shadow .2s;
}
.topic-chip:active{transform:scale(.97)}
.topic-chip.active{
  background:linear-gradient(135deg,var(--accent-deep) 0%,var(--accent) 100%);
  color:#fff;border-color:rgba(255,255,255,.2);
  box-shadow:0 4px 14px rgba(107,74,117,.28);
}

/* ---- 历史横滑 ---- */
.history-wrap{margin:32px 0 0;padding-bottom:0}
.history-head{
  display:flex;align-items:center;justify-content:space-between;padding:0 20px 10px;
}
.history-head span{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--muted-2);text-transform:uppercase}
.history-head button{font-size:12px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit}
.h-scroll{
  display:flex;gap:10px;padding:0 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
}
.h-scroll::-webkit-scrollbar{display:none}
.history-card{
  flex:0 0 200px;scroll-snap-align:start;
  background:var(--cream);border:1px solid var(--border);border-radius:16px;
  padding:14px 14px 16px;cursor:pointer;
  box-shadow:0 2px 12px rgba(30,43,36,.04);
}
.history-card .hc-topic{font-size:10px;font-weight:700;color:var(--accent-deep);letter-spacing:.06em;margin-bottom:5px}
.history-card .hc-q{font-family:var(--serif);font-size:13px;font-weight:500;color:var(--ink-soft);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ---- 底部导航 ---- */
.bottom-nav{
  position:absolute;bottom:10px;left:14px;right:14px;
  background:rgba(255,253,250,.9);backdrop-filter:blur(16px) saturate(1.15);
  border-radius:999px;border:1px solid rgba(255,255,255,.65);
  box-shadow:0 8px 32px rgba(30,43,36,.1),0 1px 0 rgba(255,255,255,.85) inset;
  display:flex;justify-content:space-around;padding:10px 6px calc(10px + env(safe-area-inset-bottom));
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted-2);cursor:pointer;opacity:.78}
.nav-item.active{color:var(--accent-deep);font-weight:600;opacity:1}
.nav-icon{font-size:17px}

/* ---- Chat 全屏 ---- */
.chat-overlay{
  position:fixed;inset:0;background:var(--bg);
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;
  display:flex;flex-direction:column;
}
.chat-overlay.open{opacity:1;pointer-events:auto}
.chat-header{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.chat-back{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--cream);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
}
.chat-header-info{flex:1}
.chat-header-name{font-size:15px;font-weight:600;color:var(--ink)}
.chat-header-tag{font-size:10px;color:var(--muted);letter-spacing:.04em;margin-top:1px}
.chat-body{
  flex:1;overflow-y:auto;padding:20px 16px 24px;
  display:flex;flex-direction:column;gap:6px;
  -webkit-overflow-scrolling:touch;
}
.chat-body::-webkit-scrollbar{display:none}
.chat-bubble{
  max-width:82%;padding:12px 16px;border-radius:20px;
  font-family:var(--sans);font-size:14px;line-height:1.6;color:var(--ink-soft);
  animation:bubbleIn .35s ease-out both;
}
@keyframes bubbleIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.chat-bubble.zaya{
  align-self:flex-start;
  background:var(--bg-2);border:1px solid var(--border);
  border-bottom-left-radius:6px;
}
.chat-bubble.zaya-serif{
  align-self:flex-start;
  background:var(--bg-2);border:1px solid var(--border);
  border-bottom-left-radius:6px;
  font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);
  line-height:1.55;
}
.chat-bubble.zaya-accent{
  align-self:flex-start;
  background:rgba(139,107,148,.07);border:1px solid rgba(139,107,148,.12);
  border-bottom-left-radius:6px;
  font-family:var(--serif);font-style:italic;font-size:14px;color:var(--accent-deep);
  line-height:1.55;
}
.chat-bubble.user-q{
  align-self:flex-end;
  background:var(--ink);color:#fff;
  border-bottom-right-radius:6px;
  font-family:var(--serif);font-size:14px;font-weight:500;line-height:1.5;
}
.chat-prompts{
  flex-shrink:0;padding:12px 16px calc(16px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border);background:var(--bg);
  display:flex;flex-direction:column;gap:8px;
}
.chat-prompts-label{font-size:10px;font-weight:700;color:var(--muted-2);letter-spacing:.08em;margin-bottom:2px}
.chat-prompt-btn{
  background:var(--cream);border:1px solid var(--border);padding:12px 14px;border-radius:18px;
  font-size:13px;color:var(--ink);text-align:left;cursor:pointer;font-family:inherit;line-height:1.45;
  transition:background .2s,border-color .2s;
}
.chat-prompt-btn:active{background:rgba(155,126,164,.08);border-color:var(--accent-2)}

.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#2D3D34,#1E2B24);color:#fff;
  padding:12px 22px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;z-index:300;max-width:300px;text-align:center;
  box-shadow:0 8px 28px rgba(30,43,36,.22);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="phone-frame">
<div class="notch"></div>
<div class="screen">

</div>

<nav class="bottom-nav">
  <div class="nav-item"><span class="nav-icon">✎</span> 日记</div>

  var currentTopic = 'self';
  var currentQIdx = 0;

  function getTopicObj(id){
    for(var i=0;i<TOPICS.length;i++) if(TOPICS[i].id===id) return TOPICS[i];
    return TOPICS[0];
  }

  function renderChips(){
    var wrap = document.getElementById('topic-chips');
    wrap.innerHTML = '';
    TOPICS.forEach(function(t){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'topic-chip' + (t.id === currentTopic ? ' active' : '');
      btn.textContent = t.name;
      btn.addEventListener('click', function(){
        if(currentTopic === t.id) return;
        currentTopic = t.id;
        currentQIdx = 0;
        renderChips();
        animateQuestion();
      });
      wrap.appendChild(btn);
    });
  }

  function showQuestion(){
    var qs = QUESTIONS[currentTopic];
    var ins = INSIGHT[currentTopic];
    currentQIdx = currentQIdx % qs.length;
    document.getElementById('q-context').textContent = CONTEXT[currentTopic];
    document.getElementById('q-insight').textContent = ins[currentQIdx % ins.length];
    document.getElementById('q-text').textContent = qs[currentQIdx];
  }

  function animateQuestion(){
    var card = document.getElementById('qcard');
    card.style.opacity = '0';
    card.style.transform = 'scale(.97)';
    setTimeout(function(){
      showQuestion();
      card.style.opacity = '1';
      card.style.transform = 'scale(1)';
    }, 150);
  }

  renderChips();
  showQuestion();

  document.getElementById('btn-refresh').addEventListener('click', function(){
    currentQIdx++;
    animateQuestion();
  });

  var chatOverlay = document.getElementById('chat-overlay');
  var chatBodyEl = document.getElementById('chat-body');
  var chatPromptsEl = document.getElementById('chat-prompts');
  var chatTagEl = document.getElementById('chat-tag');

  function openChat(){
    var c = CHAT[currentTopic];
    if(!c) return;
    var qs = QUESTIONS[currentTopic];
    var qText = qs[currentQIdx % qs.length];
    chatTagEl.textContent = '';
    chatBodyEl.innerHTML = '';
    var delay = 100;
    c.bubbles.forEach(function(b){
      var div = document.createElement('div');
      div.className = 'chat-bubble ' + (b.type === 'serif' ? 'zaya-serif' : b.type === 'accent' ? 'zaya-accent' : 'zaya');
      div.textContent = b.text;
      div.style.animationDelay = delay + 'ms';
      chatBodyEl.appendChild(div);
      delay += 80;
    });
    chatPromptsEl.innerHTML = '';
    c.prompts.forEach(function(p){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chat-prompt-btn';
      btn.textContent = p;
      btn.addEventListener('click', function(){ showToast('正在打开对话…'); closeChat(); });
      chatPromptsEl.appendChild(btn);
    });
    chatOverlay.classList.add('open');
  }
  function closeChat(){
    chatOverlay.classList.remove('open');
  }

  document.getElementById('btn-reflect').addEventListener('click', openChat);
  document.getElementById('chat-back').addEventListener('click', closeChat);

  function showToast(m){
    var t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
})();
